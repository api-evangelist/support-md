aid: support-md
name: SUPPORT.md
description: >-
  SUPPORT.md is a GitHub community health file that describes how users can get
  help with an open source project. When present in a repository root or .github/
  directory, GitHub automatically links to it from issue creation flows, directing
  users to appropriate support channels before filing bugs.
